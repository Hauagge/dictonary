services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dictionary
      POSTGRES_PASSWORD: dictionary
      POSTGRES_DB: dictionary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dictionary"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: dictionary
      DB_PASS: dictionary
      DB_NAME: dictionary
      DB_SYNCHRONIZE: "true"
      REDIS_URL: redis://redis:6379
      CACHE_TTL: 86400
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      DICTIONARY_API_URL: https://api.dictionaryapi.dev/api/v2/entries
      DICTIONARY_API_LANG: en
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
